<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect width="1024" height="512" rx="228" fill="url(#shine)"/>

  <!-- Connection lines -->
  <g stroke="#fff" stroke-linecap="round" opacity="0.5">
    <line x1="310" y1="340" x2="714" y2="340" stroke-width="14"/>
    <line x1="310" y1="340" x2="512" y2="680" stroke-width="14"/>
    <line x1="714" y1="340" x2="512" y2="680" stroke-width="14"/>
    <line x1="512" y1="680" x2="300" y2="780" stroke-width="10" opacity="0.35"/>
    <line x1="512" y1="680" x2="740" y2="800" stroke-width="10" opacity="0.35"/>
    <line x1="310" y1="340" x2="200" y2="220" stroke-width="10" opacity="0.35"/>
    <line x1="714" y1="340" x2="830" y2="230" stroke-width="10" opacity="0.35"/>
  </g>

  <!-- Outer nodes (smaller, faded) -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="780" r="42" fill="#fff" opacity="0.6"/>
    <circle cx="300" cy="780" r="26" fill="#0a84ff" opacity="0.6"/>
    <circle cx="740" cy="800" r="42" fill="#fff" opacity="0.6"/>
    <circle cx="740" cy="800" r="26" fill="#0a84ff" opacity="0.6"/>
    <circle cx="200" cy="220" r="38" fill="#fff" opacity="0.5"/>
    <circle cx="200" cy="220" r="24" fill="#00d4aa" opacity="0.5"/>
    <circle cx="830" cy="230" r="38" fill="#fff" opacity="0.5"/>
    <circle cx="830" cy="230" r="24" fill="#00d4aa" opacity="0.5"/>
  </g>

  <!-- Main nodes -->
  <g filter="url(#shadow)">
    <!-- Top left node -->
    <circle cx="310" cy="340" r="72" fill="#fff"/>
    <circle cx="310" cy="340" r="46" fill="#0a84ff"/>
    <circle cx="296" cy="326" r="12" fill="#fff" opacity="0.35"/>

    <!-- Top right node -->
    <circle cx="714" cy="340" r="72" fill="#fff"/>
    <circle cx="714" cy="340" r="46" fill="#0a84ff"/>
    <circle cx="700" cy="326" r="12" fill="#fff" opacity="0.35"/>

    <!-- Center bottom node (primary) -->
    <circle cx="512" cy="680" r="84" fill="#fff"/>
    <circle cx="512" cy="680" r="54" fill="#00d4aa"/>
    <circle cx="496" cy="664" r="14" fill="#fff" opacity="0.35"/>
  </g>
</svg>
